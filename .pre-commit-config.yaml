repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [tsx, ts, css, html, json]
  - repo: https://github.com/eslint/eslint
    rev: v9.39.4
    hooks:
      - id: eslint
        files: \.[jt]sx?$
        args: ['--fix']
  - repo: local
    hooks:
      - id: tsc
        name: TypeScript check
        entry: npx tsc --noEmit
        language: system
        types: [ts, tsx]
        pass_filenames: false
